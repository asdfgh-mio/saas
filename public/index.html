<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QADEER-AI | Advanced Bot Flow Builder</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #0b0c10 0%, #1f2833 100%); color: #c5c6c7; height: 100vh; overflow: hidden; }
        .glass-panel { background: rgba(31, 40, 51, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(102, 252, 241, 0.2); border-radius: 15px; }
        .header { text-align: center; padding: 20px; border-bottom: 1px solid rgba(102, 252, 241, 0.2); }
        .header h1 { margin: 0; color: #45a29e; }
        .container { display: flex; gap: 30px; padding: 30px; max-width: 1300px; margin: 0 auto; height: calc(100vh - 120px); }
        .builder-section { flex: 1; padding: 25px; overflow-y: auto; }
        .preview-section { width: 350px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #66fcf1; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 8px; background: rgba(11, 12, 16, 0.8); border: 1px solid rgba(69, 162, 158, 0.5); color: #fff; font-size: 14px; outline: none; box-sizing: border-box;}
        textarea { min-height: 100px; }
        .btn-action { background: linear-gradient(45deg, #45a29e, #66fcf1); color: #000; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; width: 100%;}
        
        .button-item { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid #45a29e; }
        
        /* 🌈 TUMHARA RGB NEON CODE 🌈 */
        @keyframes rgbMove { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }
        .rgb-box { padding: 3px; border-radius: 15px; background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet, red); background-size: 300%; animation: rgbMove 4s linear infinite; width: 100%; text-align: center; display: none; }
        .rgb-inner { background: #000; padding: 20px; border-radius: 12px; color: #fff; font-size: 24px; font-weight: bold; letter-spacing: 5px; }

    </style>
</head>
<body>

<div class="header glass-panel" style="border-radius:0; border-top:none; border-left:none; border-right:none;">
    <h1>QADEER-AI SaaS Dashboard</h1>
</div>

<div class="container">
    <div class="builder-section glass-panel">
        <h2 style="color: #fff; margin-top:0;">1. Connect Bot</h2>
        <div style="display: flex; gap:10px; margin-bottom: 30px;">
            <input type="text" id="phoneNumber" placeholder="WhatsApp Number (e.g. 923001234567)">
            <button class="btn-action" style="width:150px; margin-top:0;" onclick="getPairCode()">GET CODE</button>
        </div>

        <h2 style="color: #fff;">2. Advanced Flow Builder</h2>
        <div class="form-group"><label>Bot Reply Message</label><textarea id="botMessage" placeholder="Welcome to QADEER-AI!"></textarea></div>
        <div class="form-group"><label>Image URL (Optional)</label><input type="text" id="mediaUrl" placeholder="https://example.com/img.jpg"></div>
        <div class="form-group"><label>Footer Text</label><input type="text" id="footerText" placeholder="Powered by Qadeer Khan"></div>

        <h3 style="color: #fff;">Interactive Buttons</h3>
        <div id="buttonsList"></div>
        <button class="btn-action" style="background: transparent; border: 1px dashed #66fcf1; color: #66fcf1;" onclick="addButton()">+ Add Button</button>
        <button class="btn-action" onclick="saveFlow()">💾 Save & Deploy</button>
    </div>

    <div class="preview-section">
        <div class="rgb-box" id="rgbBorder">
            <div class="rgb-inner" id="codeDisplay">WAIT...</div>
        </div>
        <p id="statusText" style="color: #8696a0; font-size: 14px; text-align:center;">Enter number and click Get Code</p>
    </div>
</div>

<script>
    let btnCount = 0;

    // TUMHARI MAIN.JS WALI PERFECT API LOGIC
    async function getPairCode() {
        const num = document.getElementById("phoneNumber").value.replace(/[^0-9]/g, '');
        const codeDisplay = document.getElementById("codeDisplay");
        const rgbBorder = document.getElementById("rgbBorder");
        const statusText = document.getElementById("statusText");

        if (!num) { alert("Enter valid number!"); return; }

        rgbBorder.style.display = "block";
        codeDisplay.innerText = "CONNECTING...";
        codeDisplay.style.letterSpacing = "2px";
        statusText.innerText = "Linking to WhatsApp Servers...";

        try {
            const res = await fetch(`/api/pair?number=${num}`);
            const data = await res.json();
            
            if (data.code) {
                codeDisplay.innerText = data.code;
                codeDisplay.style.letterSpacing = "5px";
                statusText.innerText = "Enter this code in WhatsApp Linked Devices";
            } else if (data.status === 'connected') {
                codeDisplay.innerText = "LINKED";
                codeDisplay.style.color = "#00a884";
                statusText.innerText = "Bot is already connected and active!";
            } else {
                codeDisplay.innerText = "ERROR";
                codeDisplay.style.color = "#ff4d4d";
                statusText.innerText = data.error || "Server issue";
            }
        } catch (e) {
            codeDisplay.innerText = "FAILED";
            statusText.innerText = "Connection dropped. Try again.";
        }
    }

    // ADVANCED BUTTON BUILDER LOGIC
    function addButton() {
        if(btnCount >= 3) { alert("Max 3 buttons allowed by WA!"); return; }
        btnCount++;
        const id = `btn_${btnCount}`;
        const html = `
            <div class="button-item" id="${id}">
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                    <strong style="color: #66fcf1;">Button ${btnCount}</strong>
                    <span style="color:red; cursor:pointer;" onclick="document.getElementById('${id}').remove(); btnCount--; ">✖ Remove</span>
                </div>
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <select id="${id}_type" style="width:30%;">
                        <option value="reply">Quick Reply</option>
                        <option value="url">URL Link</option>
                        <option value="copy">Copy Code</option>
                    </select>
                    <input type="text" id="${id}_text" placeholder="Button Label" style="width:70%;">
                </div>
                <input type="text" id="${id}_val" placeholder="Value (URL, Command ID, or Text to Copy)">
            </div>
        `;
        document.getElementById('buttonsList').insertAdjacentHTML('beforeend', html);
    }

    // SAVE FLOW TO MONGODB
    async function saveFlow() {
        const payload = {
            phoneNumber: document.getElementById('phoneNumber').value,
            botMessage: document.getElementById('botMessage').value,
            mediaUrl: document.getElementById('mediaUrl').value,
            footerText: document.getElementById('footerText').value,
            buttons: []
        };

        if(!payload.phoneNumber) { alert("Enter Phone Number first!"); return; }

        document.querySelectorAll('.button-item').forEach(el => {
            const id = el.id;
            payload.buttons.push({
                type: document.getElementById(`${id}_type`).value,
                title: document.getElementById(`${id}_text`).value,
                value: document.getElementById(`${id}_val`).value
            });
        });

        const res = await fetch('/api/save-menu', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        alert(data.message || data.error);
    }
</script>
</body>
</html>
